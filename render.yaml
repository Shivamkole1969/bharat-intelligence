# ============================================================
# Bharat Market Intelligence — Render.com Blueprint
#
# One-click deploy:
# https://render.com/deploy?repo=https://github.com/Shivamkole1969/bharat-intelligence
# ============================================================

databases:
  - name: bharat-db
    plan: free
    databaseName: bharat_intelligence
    user: bharat

services:
  # Single service: Backend + Frontend (all-in-one)
  - type: web
    name: bharat-intelligence
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bharat-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
      - key: CORS_ORIGINS
        value: "*"
      - key: GROQ_API_KEYS
        sync: false
