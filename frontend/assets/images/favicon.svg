<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <linearGradient id="grad-blue" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>
    
    <!-- Base dark squircle -->
    <rect width="512" height="512" rx="120" fill="#060a13"/>
    <rect width="512" height="512" rx="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
    
    <!-- Left spine (The Chart Y-Axis / Stem of 'B') -->
    <rect x="140" y="110" width="56" height="292" rx="28" fill="url(#grad-blue)"/>
    
    <!-- Top Bar / Loop -->
    <path d="M 168 138 h 110 c 48 0 88 40 88 88 c 0 48 -40 88 -88 88 h -110" fill="none" stroke="url(#grad-amber)" stroke-width="56" stroke-linecap="round"/>
    
    <!-- Bottom Bar / Loop -->
    <path d="M 168 238 h 130 c 64 0 108 48 108 108 c 0 60 -44 108 -108 108 h -130" fill="none" stroke="url(#grad-amber)" stroke-width="56" stroke-linecap="round"/>

    <!-- Green Bullish Indicator Node -->
    <circle cx="360" cy="140" r="32" fill="#10b981" filter="url(#glow)"/>
    
    <!-- Connection line to node -->
    <path d="M 280 220 L 360 140" fill="none" stroke="#10b981" stroke-width="16" stroke-linecap="round"/>
</svg>
