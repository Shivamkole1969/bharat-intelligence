<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Market Map — Bharat Market Intelligence</title>
    <meta name="description" content="Interactive 3D visualization of Indian market sectors, event density, and signal strength.">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css?v=4">
    <style>
        .map-layout {
            padding-top: var(--nav-height);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        /* --- Controls Bar --- */
        .map-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px var(--space-xl);
            background: rgba(13, 19, 33, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            gap: var(--space-sm);
        }

        .map-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        /* --- Legend --- */
        .map-legend {
            display: flex;
            gap: var(--space-lg);
            font-size: 0.75rem;
            color: var(--text-muted);
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-dot.bullish {
            background: var(--color-positive);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
        }

        .legend-dot.bearish {
            background: var(--color-negative);
            box-shadow: 0 0 6px rgba(240, 99, 85, 0.4);
        }

        .legend-dot.neutral {
            background: var(--accent-secondary);
            box-shadow: 0 0 6px rgba(59, 130, 246, 0.4);
        }

        .legend-note {
            color: var(--text-muted);
            font-size: 0.72rem;
            font-style: italic;
        }

        /* --- Canvas Area --- */
        .map-canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 500px;
        }

        /* Subtle edge gradient */
        .map-canvas-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            border-radius: 0;
            box-shadow:
                inset 0 40px 60px -20px var(--bg-primary),
                inset 0 -40px 60px -20px var(--bg-primary);
        }

        #map-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* --- Tooltip --- */
        .map-tooltip {
            position: absolute;
            padding: 10px 14px;
            background: rgba(13, 19, 33, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            color: var(--text-primary);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 240px;
        }

        .map-tooltip.visible {
            opacity: 1;
        }

        .map-sector-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* --- Info Panel --- */
        .map-info-panel {
            position: absolute;
            bottom: var(--space-xl);
            right: var(--space-xl);
            width: 260px;
            padding: var(--space-lg);
            background: rgba(13, 19, 33, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            font-size: 0.8rem;
            z-index: 5;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .map-info-panel h3 {
            font-size: 0.88rem;
            margin-bottom: var(--space-sm);
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .sector-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.78rem;
            transition: background var(--transition-fast);
        }

        .sector-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .sector-row:last-child {
            border-bottom: none;
        }

        .sector-row .sector-label {
            color: var(--text-secondary);
        }

        .sector-score {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.78rem;
            font-variant-numeric: tabular-nums;
        }

        .sector-score.pos { color: var(--color-positive); }
        .sector-score.neg { color: var(--color-negative); }

        @media (max-width: 768px) {
            .map-legend {
                gap: var(--space-sm);
                font-size: 0.7rem;
            }
            .map-info-panel {
                position: static;
                width: 100%;
                margin: var(--space-md);
                border-radius: var(--radius-md);
            }
            .map-canvas-wrapper {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand"><img src="assets/images/favicon.svg" class="nav-brand-icon" alt="Bharat Intel Logo"><span>Bharat Intel</span></a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="chat.html">AI Chat</a></li>
                <li><a href="bullish.html">Bullish</a></li>
                <li><a href="bearish.html">Bearish</a></li>
                <li><a href="market-map.html" class="active">3D Map</a></li>
                <li><a href="audit.html">Audit</a></li>
            </ul>
        </div>
    </nav>

    <main class="map-layout">
        <div class="map-controls">
            <div class="map-title">🗺️ Sector <span class="text-gradient">Signal Map</span></div>
            <div class="map-legend">
                <div class="legend-item"><div class="legend-dot bullish"></div> Bullish</div>
                <div class="legend-item"><div class="legend-dot bearish"></div> Bearish</div>
                <div class="legend-item"><div class="legend-dot neutral"></div> Neutral</div>
                <div class="legend-note">Bubble size = event density</div>
            </div>
        </div>
        <div class="map-canvas-wrapper">
            <canvas id="map-canvas"></canvas>
            <div class="map-tooltip" id="map-tooltip"></div>
            <div class="map-info-panel" id="info-panel">
                <h3>Sector Overview</h3>
                <div id="sector-list">Loading...</div>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/guide.js"></script>
    <script src="assets/js/apikeys.js"></script>
    <script src="assets/js/market-map.js"></script>
</body>
</html>
